services:
  bot:
    image: zedalaye/simple-bot:latest
    container_name: bot-${EXCHANGE}
    command: /app/simple-bot bot
    volumes:
      - ./storage/${EXCHANGE}/db/:/app/db/
    env_file:
      - ./storage/${EXCHANGE}/.env
    environment:
      - BOT_RELOAD_TOKEN=${RELOAD_TOKEN}
    restart: unless-stopped
    networks:
      - bot-network

  webui:
    image: zedalaye/simple-bot:latest
    container_name: webui-${EXCHANGE}
    command: /app/simple-bot web
    volumes:
      - ./storage/${EXCHANGE}/db/:/app/db/
    env_file:
      - ./storage/${EXCHANGE}/.env
    environment:
      - BOT_RELOAD_TOKEN=${RELOAD_TOKEN}
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    name: ${EXCHANGE}-network
    driver: bridge
